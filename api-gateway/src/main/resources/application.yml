spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/api/inventory/**

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/order/**

            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**

server:
  port: 8080

eureka:
  client:
    service-url:
      default-zone: http://localhost:8761/eureka/
  instance:
    hostname: localhost